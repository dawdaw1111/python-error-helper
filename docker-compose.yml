services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"

